services:
  nodo_arequipa:
    image: postgres:16
    container_name: arequipa_db_ej1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: almacen_arequipa
    ports:
      - "5434:5432"
    volumes:
      - db_arequipa_vol:/var/lib/postgresql/data
    networks:
      - red_distribuida_ej1

  nodo_lima:
    image: postgres:16
    container_name: lima_db_ej1
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: almacen_lima
    ports:
      - "5433:5432"
    volumes:
      - db_lima_vol:/var/lib/postgresql/data
    networks:
      - red_distribuida_ej1

volumes:
  db_arequipa_vol:
  db_lima_vol:

networks:
  red_distribuida_ej1:
    driver: bridge