<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cliente API Estudiantes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f4f4f4;
        }

        h1 {
            color: #222;
        }

        .contenedor {
            background: white;
            padding: 20px;
            max-width: 700px;
            border-radius: 10px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }

        input {
            display: block;
            margin: 8px 0;
            padding: 8px;
            width: 95%;
        }

        button {
            padding: 8px 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        li {
            margin: 8px 0;
            padding: 8px;
            background: #eee;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <h1>Gestión de Estudiantes</h1>

    <h3>Registrar estudiante</h3>

    <input type="text" id="nombre" placeholder="Nombre">
    <input type="email" id="correo" placeholder="Correo">
    <input type="text" id="carrera" placeholder="Carrera">
    <input type="number" id="semestre" placeholder="Semestre">

    <button onclick="registrarEstudiante()">Registrar</button>
    <button onclick="listarEstudiantes()">Listar estudiantes</button>

    <h3>Lista de estudiantes</h3>
    <ul id="lista"></ul>
</div>

<script>
const API_URL = "http://127.0.0.1:5000/estudiantes";

async function listarEstudiantes() {
    const respuesta = await fetch(API_URL);
    const estudiantes = await respuesta.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    estudiantes.forEach(estudiante => {
        lista.innerHTML += `
            <li>
                <strong>ID:</strong> ${estudiante.id}<br>
                <strong>Nombre:</strong> ${estudiante.nombre}<br>
                <strong>Correo:</strong> ${estudiante.correo}<br>
                <strong>Carrera:</strong> ${estudiante.carrera}<br>
                <strong>Semestre:</strong> ${estudiante.semestre}<br>
                <button onclick="eliminarEstudiante(${estudiante.id})">Eliminar</button>
            </li>
        `;
    });
}

async function registrarEstudiante() {
    const estudiante = {
        nombre: document.getElementById("nombre").value,
        correo: document.getElementById("correo").value,
        carrera: document.getElementById("carrera").value,
        semestre: parseInt(document.getElementById("semestre").value)
    };

    await fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(estudiante)
    });

    listarEstudiantes();
}

async function eliminarEstudiante(id) {
    await fetch(`${API_URL}/${id}`, {
        method: "DELETE"
    });

    listarEstudiantes();
}

listarEstudiantes();
</script>

</body>
</html>
